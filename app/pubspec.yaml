name: ironshelf
description: Ironshelf — self-hosted ebook reader (Ink & Iron Apps).
publish_to: "none"
version: 0.2.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  shared_preferences: ^2.3.0
  cached_network_image: ^3.4.0
  package_info_plus: ^8.0.0
  in_app_review: ^2.0.9
  open_filex: ^4.5.0
  google_fonts: ^6.2.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  # Readers
  flutter_epub_viewer: ^1.0.0   # epub.js in a webview — CFI locators match server/web
  pdfrx: ^1.0.0                 # MIT PDF renderer, no license key
  archive: ^3.6.1               # unzip CBZ archives
  photo_view: ^0.15.0           # zoom/pan comic pages
  flutter_tts: 3.8.5            # device TTS — pinned: 4.x needs newer Kotlin than the Flutter 3.29 Android template
  epubx: ^4.0.0                 # parse EPUB chapter text for TTS

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - CHANGELOG.md

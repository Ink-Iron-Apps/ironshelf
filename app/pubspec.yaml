name: ironshelf
description: Ironshelf — self-hosted ebook reader (Ink & Iron Apps).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.0.0
  shared_preferences: ^2.3.0
  cached_network_image: ^3.4.0
  package_info_plus: ^8.0.0
  google_fonts: ^6.2.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  url_launcher: ^6.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

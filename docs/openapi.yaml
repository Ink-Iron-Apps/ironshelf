      description: Returns library changes for Kobo device synchronization.
      operationId: koboLibrarySync
      parameters:
        - $ref: "#/components/parameters/koboAuthToken"
      responses:
        "200":
          description: Library sync data

  /kobo/{authToken}/v1/library/tags:
    get:
      tags: [Kobo]
      summary: Kobo tag sync
      operationId: koboTagSync
      parameters:
        - $ref: "#/components/parameters/koboAuthToken"
      responses:
        "200":
          description: Tag sync data

  /kobo/{authToken}/v1/books/{bookId}/file/{format}:
    get:
      tags: [Kobo]
      summary: Kobo book download
      operationId: koboBookDownload
      parameters:
        - $ref: "#/components/parameters/koboAuthToken"
        - $ref: "#/components/parameters/bookId"
        - name: format
          in: path
          required: true
          schema:

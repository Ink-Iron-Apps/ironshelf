openapi: 3.0.3
info:
  title: Ironshelf API
  description: |
    Self-hosted ebook server and reader. Reads Calibre metadata.db and plain folder
    scans as library sources. Provides Author -> Series -> Book hierarchy browsing,
    reading progress sync, full-text search, collections, highlights, metadata
    enrichment, acquisition engine, webhooks, OPDS, Kobo sync, and WebDAV.

    Authentication uses either session cookies (web UI) or Bearer API keys (apps).
    The first registered user becomes the server owner with full admin privileges.
  version: 0.1.0
  contact:
    name: Ink & Iron Apps
    email: support@inknironapps.com
    url: https://inknironapps.com
  license:
    name: AGPL-3.0

servers:
  - url: "{protocol}://{host}:{port}"
    description: Ironshelf server instance
    variables:
      protocol:
        default: http
        enum: [http, https]
      host:
        default: localhost
      port:
        default: "10810"

tags:
  - name: Health
    description: Health check and readiness probes (no auth required)
  - name: Server
    description: Server info and capabilities
  - name: Auth
    description: Authentication, sessions, API keys, OIDC/SSO
  - name: Users
    description: User management and invites (admin)
  - name: Libraries
    description: Library CRUD and scanning
  - name: Authors
    description: Author browsing and detail
  - name: Series
    description: Series browsing and detail
  - name: Books
    description: Book browsing and detail
  - name: Genres
    description: Genre/tag-based browsing
  - name: Files
    description: Cover images and book file downloads
  - name: Progress
    description: Reading progress and bookmarks
  - name: Highlights
    description: Text highlights and annotations
  - name: Collections
    description: User-created reading lists
  - name: Search
    description: Full-text search across libraries
  - name: Metadata
    description: External metadata enrichment
  - name: Import/Export
    description: Data portability (progress, bookmarks, collections, library config)
  - name: Notifications
    description: User notification management
  - name: Stats
    description: Server statistics and activity logs
  - name: Webhooks
    description: Webhook management and delivery history
  - name: Acquisition
    description: Indexers, download clients, wanted list, and downloads
  - name: OPDS
    description: OPDS catalog feeds for e-reader apps
  - name: Kobo
    description: Kobo device sync endpoints
  - name: WebDAV
    description: WebDAV file access for KOReader sync

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  # ===========================================================================
  # Health (no auth)
  # ===========================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns server health status including uptime and library state.
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, version, uptime_seconds, libraries_loaded, database]
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "0.1.0"
                  uptime_seconds:
                    type: integer
                    format: int64
                  libraries_loaded:
                    type: integer
                  database:
                    type: string
                    example: ok

  /ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Returns 200 when the server is ready to accept requests, 503 otherwise.
      operationId: readinessProbe
      security: []
      responses:
        "200":
          description: Server is ready
          content:
            application/json:
              schema:
                type: object
                required: [ready, database, libraries_loaded]
                properties:
                  ready:
                    type: boolean
                  database:
                    type: string
                  libraries_loaded:
                    type: boolean
        "503":
          description: Server is not ready

  /alive:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Always returns 200 if the server process is running.
      operationId: livenessProbe
      security: []
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required: [alive]
                properties:
                  alive:
                    type: boolean
                    example: true

  # ===========================================================================
  # Server Info
  # ===========================================================================
  /api/v1/server/info:
    get:
      tags: [Server]
      summary: Server info and capabilities
      description: Public endpoint describing server name, version, enabled features, and registration state.
      operationId: getServerInfo
      security: []
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"

  # ===========================================================================
  # Auth
  # ===========================================================================
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Register a new account. The first user registered becomes the server owner
        with full admin privileges. Subsequent registrations require a valid invite code.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created and session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticate with username and password. Returns a session cookie and JSON response.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (ironshelf_session)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Invalidate the current session. If authenticated via API key, deletes all sessions for the user.
      operationId: logout
      responses:
        "204":
          description: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current user info
      description: Returns the authenticated user's ID, username, and owner status.
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [user_id, username, is_owner]
                properties:
                  user_id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  is_owner:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/api-keys:
    get:
      tags: [Auth]
      summary: List API keys
      description: Returns all API keys belonging to the authenticated user. Secret values are not returned.
      operationId: listApiKeys
      responses:
        "200":
          description: List of API key summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeySummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Auth]
      summary: Create API key
      description: |
        Generate a new API key. The full key (irs_<prefix>.<secret>) is returned only once
        in the response. Store it securely; it cannot be retrieved again.
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created (shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/api-keys/{keyId}:
    delete:
      tags: [Auth]
      summary: Delete API key
      description: Revoke and delete an API key belonging to the authenticated user.
      operationId: deleteApiKey
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: API key deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/oidc/login:
    get:
      tags: [Auth]
      summary: Start OIDC/SSO login
      description: Returns a redirect URL to the configured OIDC identity provider. Initiates PKCE flow.
      operationId: oidcLogin
      security: []
      responses:
        "200":
          description: Redirect URL to identity provider
          content:
            application/json:
              schema:
                type: object
                required: [redirect_url]
                properties:
                  redirect_url:
                    type: string
                    format: uri
        "400":
          description: OIDC is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      description: |
        Handles the callback from the OIDC identity provider after user authorization.
        Exchanges the authorization code for tokens, finds or creates a user, and
        sets a session cookie. Redirects to the web UI on success.
      operationId: oidcCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the identity provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: OAuth state parameter for CSRF protection
      responses:
        "302":
          description: Redirect to web UI with session cookie set
          headers:
            Set-Cookie:
              description: Session cookie (ironshelf_session)
              schema:
                type: string
            Location:
              description: Redirect target
              schema:
                type: string
                example: "/#/"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ===========================================================================
  # Users
  # ===========================================================================
  /api/v1/users:
    get:
      tags: [Users]
      summary: List all users
      description: Returns all users with their permissions. Requires owner status or manage_users permission.
      operationId: listUsers
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserListEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users/invite:
    post:
      tags: [Users]
      summary: Create invite code
      description: Generate a single-use invite code for new user registration. Requires owner or manage_users permission.
      operationId: createInvite
      responses:
        "201":
          description: Invite code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users/{userId}:
    delete:
      tags: [Users]
      summary: Delete a user
      description: Remove a user and all their data. Owner only. Cannot delete yourself.
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users/{userId}/permissions:
    patch:
      tags: [Users]
      summary: Set user permissions
      description: |
        Replace all permissions for a user. Cannot modify owner permissions.
        Valid permissions: read, download, manage_library, manage_users.
      operationId: setPermissions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPermissionsRequest"
      responses:
        "204":
          description: Permissions updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Libraries
  # ===========================================================================
  /api/v1/libraries:
    get:
      tags: [Libraries]
      summary: List libraries
      description: Returns all configured libraries with their type and source kind.
      operationId: listLibraries
      responses:
        "200":
          description: List of libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibrarySummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Libraries]
      summary: Create a library
      description: Create a new library pointing to a directory on disk. Requires admin privileges. Validates path existence and Calibre metadata.db for Calibre sources.
      operationId: createLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryRequest"
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLibraryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/libraries/{libraryId}:
    get:
      tags: [Libraries]
      summary: Get library detail
      description: Returns library details including custom column definitions.
      operationId: getLibrary
      parameters:
        - $ref: "#/components/parameters/libraryId"
      responses:
        "200":
          description: Library detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Libraries]
      summary: Update a library
      description: Update library name, type, or options. Admin only.
      operationId: updateLibrary
      parameters:
        - $ref: "#/components/parameters/libraryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLibraryRequest"
      responses:
        "204":
          description: Library updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Libraries]
      summary: Delete a library
      description: Remove a library configuration. Does not delete files on disk. Admin only.
      operationId: deleteLibrary
      parameters:
        - $ref: "#/components/parameters/libraryId"
      responses:
        "204":
          description: Library deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/libraries/{libraryId}/scan:
    post:
      tags: [Libraries]
      summary: Rescan library
      description: Trigger a rescan/reindex of the library. For folder sources, re-reads the directory tree. For Calibre sources, metadata.db is always current so this is a no-op. Admin only.
      operationId: scanLibrary
      parameters:
        - $ref: "#/components/parameters/libraryId"
      responses:
        "202":
          description: Scan initiated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/libraries/{libraryId}/metadata/scan:
    post:
      tags: [Metadata]
      summary: Bulk metadata enrichment
      description: |
        Scan all books in a library that are missing descriptions, then attempt
        enrichment from Google Books and Open Library. Auto-applies the best composite
        result for each book. Admin only.
      operationId: bulkMetadataScan
      parameters:
        - $ref: "#/components/parameters/libraryId"
      responses:
        "200":
          description: Bulk scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkScanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Authors
  # ===========================================================================
  /api/v1/libraries/{libraryId}/authors:
    get:
      tags: [Authors]
      summary: List authors in a library
      description: Returns paginated and sortable list of authors in the specified library.
      operationId: listAuthors
      parameters:
        - $ref: "#/components/parameters/libraryId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, sort_name, book_count, series_count]
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Paginated list of authors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAuthors"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/authors/{authorId}:
    get:
      tags: [Authors]
      summary: Get author detail
      description: Returns the author with their series list and standalone book count.
      operationId: getAuthor
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Author detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/authors/{authorId}/series:
    get:
      tags: [Authors]
      summary: Author's series
      description: Returns all series by this author.
      operationId: getAuthorSeries
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: List of series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Series"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/authors/{authorId}/standalone:
    get:
      tags: [Authors]
      summary: Author's standalone books
      description: Returns books by this author that do not belong to any series.
      operationId: getAuthorStandalone
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: List of standalone books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Series
  # ===========================================================================
  /api/v1/series/{seriesId}:
    get:
      tags: [Series]
      summary: Get series detail
      description: Returns the series with all its books sorted by series_index.
      operationId: getSeries
      parameters:
        - name: seriesId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Series detail with books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Books
  # ===========================================================================
  /api/v1/books/{bookId}:
    get:
      tags: [Books]
      summary: Get book detail
      description: Returns full book detail including formats, tags, custom column values, and identifiers.
      operationId: getBook
      parameters:
        - $ref: "#/components/parameters/bookId"
      responses:
        "200":
          description: Book detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/libraries/{libraryId}/books:
    get:
      tags: [Books]
      summary: List books in a library
      description: Returns paginated, sortable, and filterable list of books in the specified library.
      operationId: listBooks
      parameters:
        - $ref: "#/components/parameters/libraryId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, sort_title, pubdate, added_at, rating, series_index]
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: q
          in: query
          description: Full-text search by title (case-insensitive contains)
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag name (exact, case-insensitive)
          schema:
            type: string
        - name: language
          in: query
          description: Filter by language code (exact, case-insensitive)
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBooks"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/books/continue:
    get:
      tags: [Books]
      summary: Continue reading
      description: Returns the user's in-progress books (0% < progress < 100%) sorted by most recently read. Limited to 20 results.
      operationId: continueReading
      responses:
        "200":
          description: In-progress books with progress info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContinueReadingEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Genres
  # ===========================================================================
  /api/v1/genres:
    get:
      tags: [Genres]
      summary: List all genres
      description: Returns all genres/tags across all libraries with aggregate book counts, sorted alphabetically.
      operationId: listAllGenres
      responses:
        "200":
          description: List of genres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GenreEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/genres/{genreName}:
    get:
      tags: [Genres]
      summary: Books in a genre
      description: Returns paginated books tagged with this genre across all libraries.
      operationId: getGenreBooks
      parameters:
        - name: genreName
          in: path
          required: true
          schema:
            type: string
          description: URL-encoded genre name
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, author, pubdate, added_at, rating, series_index]
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Paginated books in genre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBooks"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/genres/{genreName}/authors:
    get:
      tags: [Genres]
      summary: Authors in a genre
      description: Returns authors who have books tagged with this genre across all libraries.
      operationId: getGenreAuthors
      parameters:
        - name: genreName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Authors in genre
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/genres/{genreName}/series:
    get:
      tags: [Genres]
      summary: Series in a genre
      description: Returns series that contain books tagged with this genre across all libraries.
      operationId: getGenreSeries
      parameters:
        - name: genreName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Series in genre
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Series"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/libraries/{libraryId}/genres:
    get:
      tags: [Genres]
      summary: Genres in a library
      description: Returns all genres/tags within a specific library with book counts.
      operationId: listLibraryGenres
      parameters:
        - $ref: "#/components/parameters/libraryId"
      responses:
        "200":
          description: Genres in library
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GenreEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/libraries/{libraryId}/genres/{genreName}/books:
    get:
      tags: [Genres]
      summary: Books in a genre within a library
      description: Returns paginated books tagged with this genre in a specific library.
      operationId: listLibraryGenreBooks
      parameters:
        - $ref: "#/components/parameters/libraryId"
        - name: genreName
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, author, pubdate, added_at, rating, series_index]
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Paginated books in genre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBooks"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Files / Reading
  # ===========================================================================
  /api/v1/books/{bookId}/cover:
    get:
      tags: [Files]
      summary: Get book cover image
      description: Returns the cover image for a book as JPEG. Cached for 24 hours.
      operationId: getBookCover
      parameters:
        - $ref: "#/components/parameters/bookId"
      responses:
        "200":
          description: Cover image
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=86400"
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/books/{bookId}/file:
    get:
      tags: [Files]
      summary: Download book file
      description: |
        Download the book file in the specified format. Supports HTTP Range requests
        for partial content (206). If no format is specified, returns the first available.
        Range responses are capped at 100 MB per request.
      operationId: getBookFile
      parameters:
        - $ref: "#/components/parameters/bookId"
        - name: format
          in: query
          description: Desired format (EPUB, PDF, CBZ, MOBI). Case-insensitive.
          schema:
            type: string
      responses:
        "200":
          description: Full file
          headers:
            Accept-Ranges:
              schema:
                type: string
                example: bytes
            Content-Disposition:
              schema:
                type: string
          content:
            application/epub+zip:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/x-cbz:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content (range request)
          headers:
            Content-Range:
              schema:
                type: string
                example: "bytes 0-999/5000"
            Accept-Ranges:
              schema:
                type: string
                example: bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "416":
          description: Range not satisfiable

  # ===========================================================================
  # Progress & Bookmarks
  # ===========================================================================
  /api/v1/books/{bookId}/progress:
    get:
      tags: [Progress]
      summary: Get reading progress
      description: Returns reading progress entries for a book (one per format).
      operationId: getProgress
      parameters:
        - $ref: "#/components/parameters/bookId"
      responses:
        "200":
          description: Reading progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReadingProgress"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Progress]
      summary: Update reading progress
      description: |
        Upsert reading progress for a book in a specific format. Percent must be
        between 0.0 and 1.0. When progress reaches 1.0, the book is automatically
        marked as completed.
      operationId: updateProgress
      parameters:
        - $ref: "#/components/parameters/bookId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProgressRequest"
      responses:
        "204":
          description: Progress updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/books/{bookId}/bookmarks:
    get:
      tags: [Progress]
      summary: List bookmarks
      description: Returns all bookmarks for a book, ordered by creation time.
      operationId: listBookmarks
      parameters:
        - $ref: "#/components/parameters/bookId"
      responses:
        "200":
          description: List of bookmarks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bookmark"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Progress]
      summary: Create bookmark
      description: Add a bookmark at a specific locator position in a book.
      operationId: createBookmark
      parameters:
        - $ref: "#/components/parameters/bookId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkRequest"
      responses:
        "201":
          description: Bookmark created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookmark"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/books/{bookId}/bookmarks/{bookmarkId}:
    delete:
      tags: [Progress]
      summary: Delete bookmark
      operationId: deleteBookmark
      parameters:
        - $ref: "#/components/parameters/bookId"
        - name: bookmarkId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Bookmark deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Highlights
  # ===========================================================================
  /api/v1/books/{bookId}/highlights:
    get:
      tags: [Highlights]
      summary: List highlights for a book
      description: Returns all highlights and annotations the user has created on a book.
      operationId: listBookHighlights
      parameters:
        - $ref: "#/components/parameters/bookId"
      responses:
        "200":
          description: Highlights for this book
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Highlight"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Highlights]
      summary: Create a highlight
      description: Create a new text highlight or annotation on a book.
      operationId: createHighlight
      parameters:
        - $ref: "#/components/parameters/bookId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHighlightRequest"
      responses:
        "201":
          description: Highlight created
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/highlights/{highlightId}:
    patch:
      tags: [Highlights]
      summary: Update a highlight
      description: Update the color or note of an existing highlight.
      operationId: updateHighlight
      parameters:
        - name: highlightId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHighlightRequest"
      responses:
        "204":
          description: Highlight updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Highlights]
      summary: Delete a highlight
      operationId: deleteHighlight
      parameters:
        - name: highlightId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Highlight deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/me/highlights:
    get:
      tags: [Highlights]
      summary: List all user highlights
      description: Returns all highlights for the authenticated user with optional filtering by book or color.
      operationId: listAllHighlights
      parameters:
        - name: book_id
          in: query
          description: Filter by book ID
          schema:
            type: string
        - name: color
          in: query
          description: Filter by highlight color
          schema:
            type: string
            enum: [yellow, green, blue, pink, purple]
      responses:
        "200":
          description: User's highlights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Highlight"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Collections
  # ===========================================================================
  /api/v1/collections:
    get:
      tags: [Collections]
      summary: List collections
      description: Returns the user's own collections plus other users' public collections.
      operationId: listCollections
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectionSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Collections]
      summary: Create a collection
      description: Create a new reading list / collection.
      operationId: createCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionRequest"
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCollectionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/collections/{collectionId}:
    get:
      tags: [Collections]
      summary: Get collection detail
      description: Returns the collection with its book entries. Non-owners can only view public collections.
      operationId: getCollection
      parameters:
        - $ref: "#/components/parameters/collectionId"
      responses:
        "200":
          description: Collection detail with books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Collections]
      summary: Update a collection
      description: Update name, description, or public visibility. Owner only.
      operationId: updateCollection
      parameters:
        - $ref: "#/components/parameters/collectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionRequest"
      responses:
        "204":
          description: Collection updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Collections]
      summary: Delete a collection
      description: Delete a collection. Owner only.
      operationId: deleteCollection
      parameters:
        - $ref: "#/components/parameters/collectionId"
      responses:
        "204":
          description: Collection deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/collections/{collectionId}/books:
    post:
      tags: [Collections]
      summary: Add book to collection
      description: Add a book to the collection at a specific position (or appended at end).
      operationId: addBookToCollection
      parameters:
        - $ref: "#/components/parameters/collectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBookToCollectionRequest"
      responses:
        "201":
          description: Book added to collection
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/collections/{collectionId}/books/{bookId}:
    delete:
      tags: [Collections]
      summary: Remove book from collection
      description: Remove a book from the collection. Owner only.
      operationId: removeBookFromCollection
      parameters:
        - $ref: "#/components/parameters/collectionId"
        - $ref: "#/components/parameters/bookId"
      responses:
        "204":
          description: Book removed from collection
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Search
  # ===========================================================================
  /api/v1/search:
    get:
      tags: [Search]
      summary: Global search
      description: |
        Search across all libraries for authors, series, and books. Uses tantivy
        full-text index for books when available, falls back to in-memory substring
        matching. Results are ranked by relevance.
      operationId: globalSearch
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (max 500 characters)
          schema:
            type: string
            maxLength: 500
        - name: type
          in: query
          description: Filter results by content type
          schema:
            type: string
            enum: [all, author, series, book]
            default: all
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      responses:
        "200":
          description: Search results grouped by type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/search/rebuild:
    post:
      tags: [Search]
      summary: Rebuild search index
      description: Triggers a full rebuild of the tantivy search index from all books across all libraries. Owner only.
      operationId: rebuildSearchIndex
      responses:
        "200":
          description: Index rebuilt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebuildResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ===========================================================================
  # Metadata
  # ===========================================================================
  /api/v1/books/{bookId}/metadata/search:
    get:
      tags: [Metadata]
      summary: Search external metadata
      description: Query Google Books and Open Library for metadata matching a book's title and author. Returns ranked matches and a best-composite merge.
      operationId: searchMetadata
      parameters:
        - $ref: "#/components/parameters/bookId"
      responses:
        "200":
          description: Metadata search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/books/{bookId}/metadata/apply:
    post:
      tags: [Metadata]
      summary: Apply metadata
      description: |
        Apply external metadata to a book. Can apply a specific match by index,
        the best composite from all cached results, or direct override fields.
        Stores overrides in the Ironshelf database; never mutates Calibre data.
      operationId: applyMetadata
      parameters:
        - $ref: "#/components/parameters/bookId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyMetadataRequest"
      responses:
        "200":
          description: Metadata applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyMetadataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Import / Export
  # ===========================================================================
  /api/v1/export/reading-progress:
    get:
      tags: [Import/Export]
      summary: Export reading progress
      description: Export all reading progress entries for the authenticated user as JSON.
      operationId: exportReadingProgress
      responses:
        "200":
          description: Reading progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExportedReadingProgress"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/export/bookmarks:
    get:
      tags: [Import/Export]
      summary: Export bookmarks
      description: Export all bookmarks for the authenticated user as JSON.
      operationId: exportBookmarks
      responses:
        "200":
          description: Bookmark entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExportedBookmark"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/export/collections:
    get:
      tags: [Import/Export]
      summary: Export collections
      description: Export all collections owned by the authenticated user (with book references).
      operationId: exportCollections
      responses:
        "200":
          description: Collection entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExportedCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/export/all:
    get:
      tags: [Import/Export]
      summary: Export all user data
      description: Combined export of reading progress, bookmarks, and collections as a single JSON document with Content-Disposition attachment header.
      operationId: exportAll
      responses:
        "200":
          description: Combined export document
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="ironshelf-export-2025-01-01.json"'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/import:
    post:
      tags: [Import/Export]
      summary: Import user data
      description: |
        Import an export document and merge into the authenticated user's data.
        Reading progress is upserted (newer wins). Bookmarks skip duplicates.
        Collections are created or merged by name.
      operationId: importUserData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportDocument"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/export/library-config:
    get:
      tags: [Import/Export]
      summary: Export library configuration
      description: Export all library configurations as a backup document. Owner only.
      operationId: exportLibraryConfig
      responses:
        "200":
          description: Library config backup
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryConfigExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/import/library-config:
    post:
      tags: [Import/Export]
      summary: Import library configuration
      description: |
        Restore library configurations from a backup. Creates library entries in the
        database but does not copy files or open sources. Libraries become available
        after server restart or manual scan. Owner only.
      operationId: importLibraryConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryConfigExport"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryConfigImportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ===========================================================================
  # Notifications
  # ===========================================================================
  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      description: Returns user notifications with optional filtering for unread only.
      operationId: listNotifications
      parameters:
        - name: unread
          in: query
          description: If true, return only unread notifications
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          description: Maximum number of notifications to return (max 200)
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/notifications/count:
    get:
      tags: [Notifications]
      summary: Unread notification count
      operationId: getUnreadCount
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                required: [unread]
                properties:
                  unread:
                    type: integer
                    format: int64
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/notifications/{notificationId}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      operationId: markNotificationRead
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Marked as read
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      responses:
        "204":
          description: All notifications marked read
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/notifications/{notificationId}:
    delete:
      tags: [Notifications]
      summary: Delete a notification
      operationId: deleteNotification
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Notification deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Stats & Activity
  # ===========================================================================
  /api/v1/stats:
    get:
      tags: [Stats]
      summary: Server statistics
      description: Returns server-wide statistics including counts, storage, popular books, and recent activity. Owner only.
      operationId: getServerStats
      responses:
        "200":
          description: Server statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/activity:
    get:
      tags: [Stats]
      summary: User activity log

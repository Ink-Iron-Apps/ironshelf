      description: Reset a failed download to pending and re-send to the download client.
      operationId: retryDownload
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Download retried
          content:
            application/json:
              schema:
                type: object
                properties:
                  retried:
                    type: boolean

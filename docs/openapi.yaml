      parameters:
        - name: status
          in: query
          description: Filter by download status
          schema:
            type: string
            enum: [pending, downloading, completed, failed, importing]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Downloads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Download"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/downloads/{downloadId}:
    get:
      tags: [Acquisition]
      summary: Get download detail
      operationId: getDownload
      parameters:
        - name: downloadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Download detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Download"

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check + clippy
        working-directory: server
        run: |
          cargo clippy --workspace -- -D warnings
          cargo test --workspace

      - name: Build release
        working-directory: server
        run: cargo build --release

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: ironshelf-server-linux-x86_64
          path: server/target/release/ironshelf-server

  version-bump:
    runs-on: ubuntu-latest
    needs: [build-server]
    # Skip if this push is already a version bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
            CURRENT_VERSION="0.1.0"
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="%s")
            CURRENT_VERSION="${LAST_TAG#v}"
          fi

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No version change needed"
            exit 0
          fi

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "Bumping: ${CURRENT_VERSION} → ${NEW_VERSION} (${BUMP})"

      - name: Update version in Cargo.toml
        if: steps.bump.outputs.bumped == 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" server/Cargo.toml
          git add server/Cargo.toml
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

  release:
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: needs.version-bump.outputs.bumped == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ironshelf-server-linux-x86_64
          path: artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.version-bump.outputs.new_version }}"
          chmod +x artifacts/ironshelf-server

          gh release create "$VERSION" \
            --title "Ironshelf $VERSION" \
            --generate-notes \
            artifacts/ironshelf-server#ironshelf-server-linux-x86_64

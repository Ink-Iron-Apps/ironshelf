name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ironshelf-server-linux-x86_64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ironshelf-server-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ironshelf-server-macos-x86_64
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ironshelf-server-macos-aarch64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ironshelf-server-windows-x86_64.exe
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Check + clippy (native only)
        if: "!matrix.cross"
        working-directory: server
        run: |
          cargo clippy --workspace --target ${{ matrix.target }} -- -D warnings
          cargo test --workspace

      - name: Build release (native)
        if: "!matrix.cross"
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross
        working-directory: server
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename artifact (unix)
        if: runner.os != 'Windows'
        run: cp server/target/${{ matrix.target }}/release/ironshelf-server ${{ matrix.artifact }}

      - name: Rename artifact (windows)
        if: runner.os == 'Windows'
        run: cp server/target/${{ matrix.target }}/release/ironshelf-server.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  version-bump:
    runs-on: ubuntu-latest
    needs: [build]
    # Skip if this push is already a version bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
            CURRENT_VERSION="0.1.0"
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="%s")
            CURRENT_VERSION="${LAST_TAG#v}"
          fi

          # Determine bump type from conventional commits.
          # If all commits are non-bumping types (chore, ci, docs, style, build),
          # skip the release entirely.
          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^(fix|perf|refactor)(\(.*\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits found (only chore/ci/docs/style/build). Skipping release."
            exit 0
          fi

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No version change needed"
            exit 0
          fi

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "Bumping: ${CURRENT_VERSION} → ${NEW_VERSION} (${BUMP})"

      - name: Update version in Cargo.toml
        if: steps.bump.outputs.bumped == 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" server/Cargo.toml
          git add server/Cargo.toml
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag -f "v${NEW_VERSION}"
          git push origin main --tags --force

  release:
    runs-on: ubuntu-latest
    needs: [build, version-bump]
    if: needs.version-bump.outputs.bumped == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Each artifact is in its own subdirectory
          for dir in artifacts/*/; do
            cp "$dir"* release-assets/ 2>/dev/null || true
          done
          # Make unix binaries executable
          chmod +x release-assets/ironshelf-server-linux-* 2>/dev/null || true
          chmod +x release-assets/ironshelf-server-macos-* 2>/dev/null || true
          # Include install scripts and make shell scripts executable
          cp deploy/install.sh release-assets/
          cp deploy/install.ps1 release-assets/
          cp deploy/uninstall.sh release-assets/
          cp deploy/uninstall.ps1 release-assets/
          chmod +x release-assets/install.sh release-assets/uninstall.sh
          ls -la release-assets/

      # TODO: Enable when SignPath certificate is configured
      # - name: Sign PowerShell scripts
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
      #     organization-id: '${{ secrets.SIGNPATH_ORG_ID }}'
      #     project-slug: 'ironshelf'
      #     signing-policy-slug: 'release-signing'
      #     artifact-configuration-slug: 'powershell-scripts'
      #     github-artifact-id: 'install-scripts'

      - name: Generate release notes from commits
        id: notes
        run: |
          VERSION="v${{ needs.version-bump.outputs.new_version }}"
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="%s")
          fi

          # Build release notes from conventional commits
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            # Skip merge commits and CI commits
            [[ "$line" =~ ^(Merge|Auto-merge|chore:\ bump) ]] && continue

            if [[ "$line" =~ ^feat ]]; then
              desc="${line#feat: }"
              desc="${desc#feat\(*\): }"
              FEATURES="${FEATURES}- ${desc}\n"
            elif [[ "$line" =~ ^fix ]]; then
              desc="${line#fix: }"
              desc="${desc#fix\(*\): }"
              FIXES="${FIXES}- ${desc}\n"
            elif [[ "$line" =~ ^(refactor|perf|docs) ]]; then
              desc="${line}"
              OTHER="${OTHER}- ${desc}\n"
            fi
          done <<< "$COMMITS"

          NOTES="## What's New\n\n"
          if [ -n "$FEATURES" ]; then
            NOTES="${NOTES}### Features\n\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}### Bug Fixes\n\n${FIXES}\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="${NOTES}### Other Changes\n\n${OTHER}\n"
          fi

          NOTES="${NOTES}---\n\n"
          NOTES="${NOTES}### Installation\n\n"
          NOTES="${NOTES}**Linux/macOS:** \`curl -fsSL https://github.com/LightWraith8268/ironshelf/releases/download/${VERSION}/install.sh | bash\`\n\n"
          NOTES="${NOTES}**Windows (PowerShell as Admin):** \`powershell -ExecutionPolicy Bypass -File install.ps1\`\n\n"
          NOTES="${NOTES}**Manual:** Download the binary for your platform below.\n\n"
          NOTES="${NOTES}See [DEPLOYMENT.md](https://github.com/LightWraith8268/ironshelf/blob/main/docs/DEPLOYMENT.md) for full setup guide."

          echo -e "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.version-bump.outputs.new_version }}"

          gh release create "$VERSION" \
            --title "Ironshelf $VERSION" \
            --notes-file /tmp/release-notes.md \
            release-assets/ironshelf-server-linux-x86_64#ironshelf-server-linux-x86_64 \
            release-assets/ironshelf-server-linux-aarch64#ironshelf-server-linux-aarch64 \
            release-assets/ironshelf-server-macos-x86_64#ironshelf-server-macos-x86_64 \
            release-assets/ironshelf-server-macos-aarch64#ironshelf-server-macos-aarch64 \
            "release-assets/ironshelf-server-windows-x86_64.exe#ironshelf-server-windows-x86_64.exe" \
            release-assets/install.sh#install.sh \
            release-assets/install.ps1#install.ps1 \
            release-assets/uninstall.sh#uninstall.sh \
            release-assets/uninstall.ps1#uninstall.ps1

name: Flutter

on:
  push:
    branches: [claude/dev, main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Create platform directories
        working-directory: app
        run: flutter create --org com.inknironapps --project-name ironshelf .
      - name: Get dependencies
        working-directory: app
        run: flutter pub get
      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos
      - name: Test
        working-directory: app
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Create platform directories
        working-directory: app
        run: flutter create --org com.inknironapps --project-name ironshelf .
      - name: Get dependencies
        working-directory: app
        run: flutter pub get
      - name: Build APK
        working-directory: app
        run: flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: ironshelf-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

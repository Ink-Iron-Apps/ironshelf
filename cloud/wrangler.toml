name = "ironshelf-cloud"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = "0eda678cda43e70dba0009e165937044"

# First-party custom domain so ad-blockers / privacy lists that target
# *.workers.dev don't break the clients. The workers.dev URL keeps working too.
[[routes]]
pattern = "cloud.inknironapps.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "ironshelf-cloud"
database_id = "88fb0e02-2559-46d5-bf63-774e2ae0cb73"

[vars]
CORS_ORIGIN = "https://ironshelf.inknironapps.com"
# JWT_SECRET is set via `wrangler secret put JWT_SECRET` — not in vars
